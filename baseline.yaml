base_directory : ./dataset
pickle_directory: ./pickle
model_directory: ./model
result_directory: ./result
result_file: result.yaml

feature:
  n_mels: 64
  frames: 5
  n_fft: 1024
  hop_length: 512
  power: 2.0
  # CNN patch params (used when model_type = cnn)
  patch_frames: 64
  patch_stride: 32
  cnn_base_dim: 16

fit:
  learning_rate: 0.001
  epochs: 200
  batch_size: 512
  shuffle: True
  validation_split: 0.1
  verbose: 1
  bottleneck_size: 3
  normalize: False
  score_mode: max
  denoising_std: 0.1
  model_type: vae
  beta: 0.1
